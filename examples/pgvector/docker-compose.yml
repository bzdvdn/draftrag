services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: draftrag
      POSTGRES_PASSWORD: draftrag
      POSTGRES_DB: draftrag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U draftrag -d draftrag"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  pgdata:
